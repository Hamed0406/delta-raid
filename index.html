<body>
<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)">Delta Raid — free retro river shooter browser game inspired by the 1982 classic River Raid</h1>
<canvas id="c" width="480" height="640" tabindex="0" aria-label="Delta Raid game. Arrow keys steer, space shoots, Enter starts. On touch screens, drag to fly."></canvas>
<script>
'use strict';
// ---------- setup ----------
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const W = 480, H = 640, HUDH = 56, PH = H - HUDH;   // play-area height
const SEG = 8;            // river row height in px
const BR = 200;           // rows between bridges (one bridge = one level)
const clamp = (v,a,b) => v < a ? a : v > b ? b : v;
const rand  = (a,b) => a + Math.random() * (b - a);
// deterministic per-row random, so bank decorations don't flicker
function rnd(r,k){let x=(Math.imul(r,73856093)^Math.imul(k,19349663))>>>0;
  x=Math.imul(x^x>>>13,1274126177);return((x^x>>>16)>>>0)/4294967296}

// ---------- state ----------
let state='title', t=0, dist=0, spd=0, score=0, level=1, lives=3, fuel=100;
let rows, genCx, genHw, islLeft, islHw, spawnCur;
let ents, bullets, parts, plane, shootCd, jetT, deadT, msg='', msgT=0, lowT=0, inv=0;
let hi=0; try{hi=+localStorage.getItem('rr_hi')||0}catch(e){}
const pd = () => dist + 64;              // plane's river-distance (screen y = PH-64)

// ---------- river generation (lazy random walk) ----------
function genTo(i){
  while(rows.length<=i){
    const r=rows.length, pb=r%BR, nearB=pb>BR-18||pb<6;
    genCx=clamp(genCx+rand(-6,6),120,W-120);
    const minHw=nearB?70:Math.max(38,82-4*level);
    genHw=clamp(genHw+rand(-4,4),minHw,110);
    let is=null;
    if(nearB)islLeft=0;
    else if(islLeft>0){islLeft--;islHw=clamp(islHw+rand(-2,2),10,genHw-48);is={hw:islHw}}
    else if(r>90&&genHw>72&&Math.random()<.02+.004*level){islLeft=20+Math.random()*30|0;islHw=10}
    rows.push({cx:genCx,hw:genHw,is,bridge:pb===BR-1&&r>60});
  }
  return rows[i];
}
const rowAt = d => genTo(Math.max(0, d/SEG|0));

// pick a water x for spawning, avoiding the island
function pickX(row){
  const L=row.cx-row.hw+18, R=row.cx+row.hw-18;
  if(row.is){
    const li=row.cx-row.is.hw-16, ri=row.cx+row.is.hw+16;
    return Math.random()<.5?rand(L,Math.max(L+4,li)):rand(Math.min(R-4,ri),R);
  }
  return rand(L,R);
}

function spawn(r){
  const row=genTo(r), d=r*SEG+4;
  if(row.bridge){ents.push({k:'bridge',x:row.cx,d,w:row.hw*2+24,h:20});return}
  const pb=r%BR; if(pb>BR-20||pb<8)return;              // keep bridge approach clear
  if(Math.random()<Math.max(.012,.03-.002*level))
    ents.push({k:'fuel',x:pickX(row),d,w:20,h:30,vx:0});
  else if(Math.random()<Math.min(.04+.011*level,.15)){
    const heli=Math.random()<.35+.03*level;
    const v=(heli?50+7*level:26+4*level)*(Math.random()<.5?-1:1);
    ents.push({k:heli?'heli':'ship',x:pickX(row),d,w:heli?26:36,h:12,vx:v});
  }
}

// ---------- audio (WebAudio, created on first key press) ----------
let actx=null, muted=false;
function initAudio(){if(!actx){try{actx=new AudioContext()}catch(e){}}}
function tone(f,dur,type,vol,slide){
  if(!actx||muted)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||'square';o.frequency.value=f;
  if(slide)o.frequency.exponentialRampToValueAtTime(slide,actx.currentTime+dur);
  g.gain.setValueAtTime(vol||.12,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
  o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
}
function sBoom(big){
  if(!actx||muted)return;
  const n=actx.sampleRate*(big?.5:.25)|0,b=actx.createBuffer(1,n,actx.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const s=actx.createBufferSource();s.buffer=b;
  const g=actx.createGain();g.gain.value=big?.35:.2;
  s.connect(g).connect(actx.destination);s.start();
}
const sShoot=()=>tone(900,.09,'square',.08,300);
const sLow  =()=>tone(200,.12,'triangle',.15);
const sLevel=()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,.12,'square',.12),i*90));

// ---------- effects ----------
function boomAt(x,d,big){
  const n=big?40:22;
  for(let i=0;i<n;i++)parts.push({x,d,vx:rand(-140,140),vd:rand(-140,140),
    life:rand(.35,big?1:.7),col:['#ff4a1e','#ffb01e','#ffe14a','#c8c8c8'][Math.random()*4|0]});
  sBoom(big);
}
function puff(x,d){for(let i=0;i<5;i++)parts.push({x,d,vx:rand(-50,50),vd:rand(-50,50),life:.25,col:'#aaa'})}

// ---------- game flow ----------
function reset(){
  rows=[];genCx=W/2;genHw=85;islLeft=0;islHw=10;
  dist=0;score=0;level=1;lives=3;fuel=100;
  ents=[];bullets=[];parts=[];plane={x:W/2};
  shootCd=0;jetT=5;msgT=0;deadT=0;lowT=0;inv=2.5;
  spawnCur=(PH/SEG|0)+2;genTo(spawnCur);
}
function start(){reset();state='play'}
function die(){
  if(state!=='play')return;
  boomAt(plane.x,pd(),true);
  lives--;deadT=1.6;state='dead';
}

// ---------- update ----------
function update(dt){
  t+=dt;msgT-=dt;
  for(const p of parts){p.x+=p.vx*dt;p.d+=p.vd*dt;p.life-=dt}
  parts=parts.filter(p=>p.life>0);
  if(state!=='play'&&state!=='dead')return;

  if(state==='dead'){
    deadT-=dt;
    if(deadT<=0){
      if(lives<=0){state='over';if(score>hi){hi=score;try{localStorage.setItem('rr_hi',hi)}catch(e){}}}
      else{const r=rowAt(pd());plane.x=r.is?r.cx+(r.is.hw+r.hw)/2:r.cx;fuel=100;inv=2.5;ents=ents.filter(e=>e.d>dist+PH);state='play'}
    }
    return;
  }

  // scroll (up/W = throttle, down/S = brake); WASD aliases the arrows
  const kL=keys.ArrowLeft||keys.KeyA,kR=keys.ArrowRight||keys.KeyD,
        kU=keys.ArrowUp||keys.KeyW||touchZone>0,kD=keys.ArrowDown||keys.KeyS||touchZone<0;
  spd=(88+9*Math.min(level,12))*(kU?1.7:kD?.55:1);
  dist+=spd*dt;
  inv-=dt;

  // generate river & spawn entities as new rows appear at the top
  const top=((dist+PH)/SEG|0)+2;genTo(top);
  while(spawnCur<top){spawnCur++;spawn(spawnCur)}

  // steer & shoot
  if(kL)plane.x-=230*dt;
  if(kR)plane.x+=230*dt;
  if(touchX!=null)plane.x+=clamp(touchX-plane.x,-260*dt,260*dt); // plane follows finger
  plane.x=clamp(plane.x,14,W-14);
  shootCd-=dt;
  if((keys.Space||touchX!=null)&&shootCd<=0){shootCd=.22;bullets.push({x:plane.x,d:pd()+16});sShoot()}

  // fuel
  fuel-=dt*(1.8+(kU?1:0));
  if(fuel<25){lowT-=dt;if(lowT<=0){lowT=.7;sLow()}}
  if(fuel<=0){fuel=0;die();return}

  // jets streak across from level 2
  jetT-=dt;
  if(jetT<=0&&level>=2){
    jetT=rand(3,8)-Math.min(level*.3,3);
    const dir=Math.random()<.5?1:-1;
    ents.push({k:'jet',x:dir>0?-30:W+30,d:dist+rand(PH*.5,PH*.9),w:26,h:10,vx:dir*(150+14*level)});
  }

  // move enemies, bounce off banks/island
  for(const e of ents){
    if(e.k==='ship'||e.k==='heli'){
      e.x+=e.vx*dt;const r=rowAt(e.d);
      let L=r.cx-r.hw+e.w/2+4,R=r.cx+r.hw-e.w/2-4;
      if(r.is){if(e.x<r.cx)R=Math.min(R,r.cx-r.is.hw-e.w/2-4);else L=Math.max(L,r.cx+r.is.hw+e.w/2+4)}
      if(e.x<L){e.x=L;e.vx=Math.abs(e.vx)}
      if(e.x>R){e.x=R;e.vx=-Math.abs(e.vx)}
    }else if(e.k==='jet')e.x+=e.vx*dt;
  }
  ents=ents.filter(e=>e.d>dist-60&&!(e.k==='jet'&&(e.x<-60||e.x>W+60)));

  // bullets: fly up, stop at banks/island, hit entities
  for(const b of bullets){
    b.d+=(560+spd)*dt;const r=rowAt(b.d);
    if(Math.abs(b.x-r.cx)>r.hw||(r.is&&Math.abs(b.x-r.cx)<r.is.hw)){b.hit=true;puff(b.x,b.d);continue}
    for(const e of ents){
      if(e.dead)continue;
      if(Math.abs(b.x-e.x)<e.w/2+3&&Math.abs(b.d-e.d)<e.h/2+8){
        b.hit=true;e.dead=true;
        boomAt(e.x,e.d,e.k==='bridge');
        score+={ship:30,heli:60,jet:100,fuel:80,bridge:500}[e.k];
        if(e.k==='bridge'){level++;msg='LEVEL '+level;msgT=2;sLevel()}
        break;
      }
    }
  }
  bullets=bullets.filter(b=>!b.hit&&b.d<dist+PH+20);
  ents=ents.filter(e=>!e.dead);

  // plane vs banks/island (hitbox slightly forgiving)
  for(const dy of[-12,0,12]){
    const r=rowAt(pd()+dy);
    if(plane.x-10<r.cx-r.hw||plane.x+10>r.cx+r.hw||
       (r.is&&plane.x+10>r.cx-r.is.hw&&plane.x-10<r.cx+r.is.hw)){die();return}
  }
  // plane vs entities (fuel depot refuels, everything else kills;
  // brief spawn protection after start/respawn)
  for(const e of ents){
    if(Math.abs(e.x-plane.x)<(e.w+20)/2&&Math.abs(e.d-pd())<(e.h+22)/2){
      if(e.k==='fuel'){fuel=Math.min(100,fuel+30*dt);continue}
      if(inv>0)continue;
      if(e.k!=='bridge')e.dead=true;
      die();return;
    }
  }
  ents=ents.filter(e=>!e.dead);
}

// ---------- draw ----------
function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  // river rows
  const r0=Math.max(0,dist/SEG|0), r1=(dist+PH)/SEG|0;
  for(let r=r0;r<=r1;r++){
    const row=genTo(r), y=PH-(r*SEG-dist)-SEG-1, h=SEG+2;
    // grass banks
    ctx.fillStyle=(r&1)?'#237a23':'#278527';
    ctx.fillRect(0,y,W,h);
    // sandy shoreline
    ctx.fillStyle=(r&1)?'#cdb45e':'#d9c06a';
    ctx.fillRect(row.cx-row.hw-4,y,4,h);
    ctx.fillRect(row.cx+row.hw,y,4,h);
    // water
    ctx.fillStyle=(r&1)?'#1646c0':'#1c50d4';
    ctx.fillRect(row.cx-row.hw,y,row.hw*2,h);
    // shimmer streaks
    if(rnd(r,3)<.3){
      ctx.fillStyle='#4a7ae8';
      ctx.fillRect(row.cx-row.hw+8+rnd(r,4)*(row.hw*2-34),y+3,18,2);
    }
    if(row.is){ // island: sand rim + grass
      ctx.fillStyle='#d9c06a';ctx.fillRect(row.cx-row.is.hw-3,y,row.is.hw*2+6,h);
      ctx.fillStyle=(r&1)?'#2d8f2d':'#329932';ctx.fillRect(row.cx-row.is.hw,y,row.is.hw*2,h);
    }
    if(r%3===0){ // two-tone trees scattered on both banks
      const bl=row.cx-row.hw-4, br=row.cx+row.hw+4;
      if(bl>32){const tx=8+rnd(r,1)*(bl-38);
        ctx.fillStyle='#0c4f0c';ctx.fillRect(tx,y,11,h);
        ctx.fillStyle='#176e17';ctx.fillRect(tx+2,y+1,7,h-3);}
      if(W-br>32){const tx=br+8+rnd(r,2)*(W-br-38);
        ctx.fillStyle='#0c4f0c';ctx.fillRect(tx,y,11,h);
        ctx.fillStyle='#176e17';ctx.fillRect(tx+2,y+1,7,h-3);}
    }
  }
  // entities
  for(const e of ents){
    const sy=PH-(e.d-dist);if(sy<-30||sy>PH+30)continue;
    const dir=e.vx>0?1:-1;
    if(e.k==='ship'){
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(e.x-dir*30,sy-1,10,3); // wake
      ctx.fillStyle='#9a5522';                                                // hull with bow
      ctx.beginPath();
      ctx.moveTo(e.x+dir*20,sy);ctx.lineTo(e.x+dir*10,sy-5);ctx.lineTo(e.x-dir*18,sy-5);
      ctx.lineTo(e.x-dir*18,sy+5);ctx.lineTo(e.x+dir*10,sy+5);ctx.closePath();ctx.fill();
      ctx.fillStyle='#f2f2f2';ctx.fillRect(e.x-8,sy-10,14,6);                 // cabin
      ctx.fillStyle='#e03030';ctx.fillRect(e.x-8,sy-12,14,2);                 // red roof
    }else if(e.k==='heli'){
      ctx.fillStyle='#3a3d46';
      ctx.fillRect(e.x-10,sy-5,20,10);                                        // body
      ctx.fillRect(e.x-dir*22,sy-2,14,4);                                     // tail boom
      ctx.fillStyle='#9adcff';ctx.fillRect(e.x+dir*2,sy-3,6,4);               // canopy
      ctx.fillStyle='#c9ccd8';
      const rl=(t*14|0)&1?14:5;
      ctx.fillRect(e.x-rl,sy-9,rl*2,2);                                       // main rotor
      ctx.fillRect(e.x-dir*23,sy-6,2,8);                                      // tail rotor
    }else if(e.k==='jet'){
      ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(e.x-dir*38,sy-1,16,2); // contrail
      ctx.fillStyle='#d8dbe8';
      ctx.beginPath();
      ctx.moveTo(e.x+dir*14,sy);ctx.lineTo(e.x-dir*12,sy-6);ctx.lineTo(e.x-dir*12,sy+6);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='#5560a0';ctx.fillRect(e.x-dir*12-2,sy-3,4,6);            // tail fin
    }else if(e.k==='fuel'){
      ctx.fillStyle='#b02020';ctx.fillRect(e.x-11,sy-16,22,32);               // border
      ctx.fillStyle='#e84040';ctx.fillRect(e.x-9,sy-14,18,28);
      ctx.fillStyle='#fff';ctx.fillRect(e.x-9,sy-6,18,5);                     // white band
      ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillStyle='#fff';
      ctx.fillText('F',e.x,sy+11);
    }else if(e.k==='bridge'){
      ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(e.x-e.w/2,sy+11,e.w,4);     // shadow on water
      ctx.fillStyle='#98989f';ctx.fillRect(e.x-e.w/2,sy-11,e.w,22);           // deck
      ctx.fillStyle='#55555c';ctx.fillRect(e.x-e.w/2,sy-4,e.w,8);             // roadway
      ctx.fillStyle='#ffd41e';
      for(let px=-e.w/2+6;px<e.w/2-8;px+=18)ctx.fillRect(e.x+px,sy-1,9,2);    // lane dashes
      ctx.fillStyle='#6e6e76';
      for(let px=-e.w/2+8;px<e.w/2-6;px+=24)ctx.fillRect(e.x+px,sy-11,5,22);  // girders
    }
  }
  // bullets
  ctx.fillStyle='#fff';
  for(const b of bullets){const sy=PH-(b.d-dist);ctx.fillRect(b.x-1.5,sy-4,3,9)}
  // plane (blinks while spawn-protected)
  if((state==='play'||state==='pause')&&!(inv>0&&(t*8|0)&1)){
    const px=plane.x,py=PH-64;
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(px-11,py+17,22,4);           // shadow
    if(keys.ArrowUp||keys.KeyW){                                              // engine flame
      ctx.fillStyle=(t*20|0)&1?'#ff8020':'#ffd040';ctx.fillRect(px-2,py+14,4,7);
    }
    ctx.fillStyle='#e8b400';                                                  // swept wings
    ctx.beginPath();
    ctx.moveTo(px,py-4);ctx.lineTo(px-15,py+8);ctx.lineTo(px-15,py+11);ctx.lineTo(px,py+5);
    ctx.lineTo(px+15,py+11);ctx.lineTo(px+15,py+8);ctx.closePath();ctx.fill();
    ctx.fillStyle='#ffd41e';                                                  // fuselage
    ctx.beginPath();
    ctx.moveTo(px,py-16);ctx.lineTo(px-4,py-6);ctx.lineTo(px-3,py+14);
    ctx.lineTo(px+3,py+14);ctx.lineTo(px+4,py-6);ctx.closePath();ctx.fill();
    ctx.fillRect(px-8,py+10,16,4);                                            // tail wings
    ctx.fillStyle='#3a6ea8';ctx.fillRect(px-2,py-8,4,7);                      // cockpit
  }
  // particles
  for(const p of parts){
    const sy=PH-(p.d-dist);
    ctx.globalAlpha=Math.min(1,p.life*2);ctx.fillStyle=p.col;
    ctx.fillRect(p.x-2,sy-2,4,4);
  }
  ctx.globalAlpha=1;
  // HUD
  ctx.fillStyle='#33343c';ctx.fillRect(0,PH,W,HUDH);
  ctx.fillStyle='#15161c';ctx.fillRect(0,PH,W,3);
  ctx.textAlign='left';ctx.font='bold 18px monospace';ctx.fillStyle='#ffd41e';
  ctx.fillText(String(score).padStart(6,'0'),12,PH+24);
  ctx.font='11px monospace';ctx.fillStyle='#aab';
  ctx.fillText('HI '+String(Math.max(hi,score)).padStart(6,'0'),12,PH+42);
  ctx.fillText('LEVEL '+level,120,PH+42);
  for(let i=0;i<lives;i++){ // small plane icons
    const lx=126+i*16;ctx.fillStyle='#ffd41e';
    ctx.fillRect(lx,PH+12,3,12);ctx.fillRect(lx-4,PH+17,11,3);
  }
  // fuel gauge
  ctx.fillStyle='#15161c';ctx.fillRect(228,PH+12,180,20);
  ctx.fillStyle=fuel<25?((t*3|0)&1?'#e03030':'#801818'):'#3fd43f';
  ctx.fillRect(230,PH+14,176*fuel/100,16);
  ctx.fillStyle='#fff';ctx.font='10px monospace';
  ctx.fillText('E',232,PH+42);ctx.fillText('F',400,PH+42);ctx.fillText('FUEL',300,PH+42);
  ctx.fillStyle='#ffffff55';ctx.fillRect(317,PH+12,2,20);
  if(muted){ctx.fillStyle='#e0b030';ctx.fillText('MUTED',424,PH+24)}
  // messages / overlays
  ctx.textAlign='center';
  if(msgT>0&&state==='play'){
    ctx.font='bold 30px monospace';ctx.fillStyle=(t*4|0)&1?'#ffd41e':'#fff';
    ctx.fillText(msg,W/2,PH/2);
  }
  if(state==='title'||state==='over'||state==='pause'){
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,PH);
    ctx.fillStyle='#ffd41e';ctx.font='bold 44px monospace';
    ctx.fillText(state==='over'?'GAME OVER':state==='pause'?'PAUSED':'DELTA RAID',W/2,200);
    ctx.font='16px monospace';ctx.fillStyle='#fff';
    if(state==='over'){
      ctx.fillText('SCORE '+score+'   HI '+hi,W/2,250);
      ctx.fillText('PRESS ENTER TO PLAY AGAIN',W/2,300);
    }else if(state==='pause'){
      ctx.fillText('PRESS P TO RESUME',W/2,260);
    }else{
      ctx.fillText('←→ / A D STEER   ↑↓ / W S THROTTLE',W/2,270);
      ctx.fillText('SPACE SHOOT   P PAUSE   M MUTE',W/2,296);
      ctx.fillText('TOUCH: DRAG TO FLY, AUTO-FIRE',W/2,322);
      ctx.fillText('SHOOT BRIDGES TO LEVEL UP',W/2,348);
      ctx.fillText('FLY OVER   F   TO REFUEL',W/2,374);
      ctx.fillStyle=(t*2|0)&1?'#ffd41e':'#fff';
      ctx.fillText('PRESS ENTER OR TAP TO START',W/2,420);
    }
  }
}

// ---------- input ----------
const keys={};
addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','Enter'].includes(e.code))e.preventDefault();
  initAudio();
  if(e.repeat)return;
  keys[e.code]=true;
  if(e.code==='Enter'&&(state==='title'||state==='over'))start();
  if(e.code==='KeyP'&&(state==='play'||state==='pause'))state=state==='play'?'pause':'play';
  if(e.code==='KeyM')muted=!muted;
});
addEventListener('keyup',e=>keys[e.code]=false);
document.addEventListener('visibilitychange',()=>{if(document.hidden&&state==='play')state='pause'});
cv.addEventListener('click',()=>{initAudio();if(state==='title'||state==='over')start()});

// touch controls: drag to fly (auto-fire); top third = throttle, bottom = brake
let touchX=null,touchZone=0;
function onTouch(e){
  e.preventDefault();initAudio();
  const T=e.touches[0];
  if(!T){touchX=null;touchZone=0;return}
  const b=cv.getBoundingClientRect();
  touchX=clamp((T.clientX-b.left)*W/b.width,14,W-14);
  // brake only on the HUD bar, so a finger resting below the plane doesn't brake
  const ty=(T.clientY-b.top)*H/b.height;
  touchZone=ty<PH*.33?1:ty>PH?-1:0;
  if(state==='title'||state==='over')start();
}
cv.addEventListener('touchstart',onTouch,{passive:false});
cv.addEventListener('touchmove',onTouch,{passive:false});
cv.addEventListener('touchend',onTouch,{passive:false});
cv.addEventListener('touchcancel',onTouch,{passive:false});

// ---------- main loop ----------
reset();
let last=0;
function frame(ts){
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  if(state!=='pause')update(dt);else t+=dt;
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
